services:
  - type: worker
    name: huntme-bot
    runtime: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: ADMIN_CHAT_ID
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_MODEL
        value: meta-llama/llama-3.1-8b-instruct:free
      - key: DATABASE_URL
        fromDatabase:
          name: huntme-db
          property: connectionURI
      - key: N8N_WEBHOOK_URL
        sync: false
      - key: REFERRAL_LINK
        sync: false

databases:
  - name: huntme-db
    plan: free
    databaseName: huntme
