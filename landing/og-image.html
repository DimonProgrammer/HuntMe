<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1200">
  <title>OG Image — Apex Talent</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 1200px;
      height: 630px;
      overflow: hidden;
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: #1A0F2E;
      color: #fff;
      position: relative;
    }

    /* Grain texture */
    body::before {
      content: '';
      position: absolute;
      inset: 0;
      background: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 1;
    }

    .container {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      padding: 60px 80px;
      position: relative;
      z-index: 2;
    }

    /* ── Decorative geometry ── */

    /* Large A watermark */
    .watermark {
      position: absolute;
      right: -30px;
      top: 50%;
      transform: translateY(-50%);
      z-index: 0;
    }
    .watermark polygon { fill: rgba(255,255,255,0.02); }

    /* Gradient accent line left */
    .accent-line {
      position: absolute;
      top: 0; left: 0;
      width: 5px;
      height: 100%;
      background: linear-gradient(180deg, #CCFF00, #E33BC5);
      z-index: 3;
    }

    /* Floating shapes */
    .shape-1 {
      position: absolute;
      top: 40px; right: 460px;
      width: 10px; height: 10px;
      background: #CCFF00;
      border-radius: 50%;
      opacity: 0.35;
    }
    .shape-2 {
      position: absolute;
      bottom: 80px; right: 380px;
      width: 6px; height: 6px;
      background: #E33BC5;
      border-radius: 50%;
      opacity: 0.25;
    }
    .shape-3 {
      position: absolute;
      top: 120px; right: 300px;
      width: 40px; height: 2px;
      background: rgba(204,255,0,0.15);
    }

    /* ── Content ── */

    .left { flex: 1; }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 44px;
    }
    .logo svg { flex-shrink: 0; }
    .logo span {
      font-family: 'Outfit', sans-serif;
      font-weight: 800;
      font-size: 13px;
      letter-spacing: 0.12em;
      color: rgba(255,255,255,0.4);
    }

    h1 {
      font-family: 'Outfit', sans-serif;
      font-weight: 900;
      font-size: 62px;
      line-height: 0.93;
      letter-spacing: -0.035em;
      margin-bottom: 28px;
      max-width: 580px;
    }
    h1 .magenta { color: #E33BC5; }

    .sub {
      font-size: 17px;
      line-height: 1.5;
      opacity: 0.45;
      max-width: 420px;
      margin-bottom: 32px;
    }

    .url {
      font-family: 'Outfit', sans-serif;
      font-weight: 600;
      font-size: 15px;
      color: rgba(255,255,255,0.25);
      letter-spacing: 0.02em;
    }

    /* Right column — earnings card */
    .right {
      width: 380px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .earn-card {
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 20px;
      padding: 28px 32px;
      text-align: center;
      background: rgba(255,255,255,0.02);
    }
    .earn-label {
      font-family: 'Outfit', sans-serif;
      font-weight: 600;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      opacity: 0.3;
      margin-bottom: 10px;
    }
    .earn-amount {
      font-family: 'Outfit', sans-serif;
      font-weight: 900;
      font-size: 56px;
      letter-spacing: -0.03em;
      line-height: 1;
    }
    .earn-amount .plus { color: #CCFF00; }
    .earn-period {
      font-size: 14px;
      opacity: 0.3;
      margin-top: 8px;
    }

    .tags {
      display: flex;
      gap: 8px;
      justify-content: center;
    }
    .tag {
      background: rgba(204,255,0,0.08);
      border: 1px solid rgba(204,255,0,0.15);
      color: #CCFF00;
      font-family: 'Outfit', sans-serif;
      font-weight: 700;
      font-size: 12px;
      padding: 7px 14px;
      border-radius: 100px;
      letter-spacing: 0.02em;
    }
  </style>
</head>
<body>

  <div class="accent-line"></div>
  <div class="shape-1"></div>
  <div class="shape-2"></div>
  <div class="shape-3"></div>

  <!-- Giant A watermark -->
  <svg class="watermark" width="500" height="500" viewBox="0 0 80 80" fill="none">
    <polygon points="40,16 18,62 30,62 40,38 50,62 62,62"/>
  </svg>

  <div class="container">
    <div class="left">
      <div class="logo">
        <svg width="24" height="24" viewBox="0 0 80 80" fill="none">
          <polygon points="40,16 18,62 30,62 40,38 50,62 62,62" fill="#fff"/>
        </svg>
        <span>APEX TALENT</span>
      </div>

      <h1>Remote Stream <span class="magenta">Moderator</span></h1>

      <p class="sub">
        Work behind the scenes. Earn in USD.<br>
        Paid training, weekly payout, no camera.
      </p>

      <div class="url">apexhiring.vercel.app</div>
    </div>

    <div class="right">
      <div class="earn-card">
        <div class="earn-label">Weekly earnings</div>
        <div class="earn-amount">$150–400<span class="plus">+</span></div>
        <div class="earn-period">per week in USD</div>
      </div>
      <div class="tags">
        <span class="tag">Fully Remote</span>
        <span class="tag">Paid Training</span>
        <span class="tag">Every Sunday</span>
      </div>
    </div>
  </div>

</body>
</html>
