<!DOCTYPE html>

<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Apex Talent — Knowledge Base</title>
<meta name="robots" content="noindex, nofollow">
<meta name="theme-color" content="#1A0F2E">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="icon" href="/favicon.ico" sizes="32x32">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Fraunces:ital,opsz,wght@1,9..144,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
--ink:#1A0F2E;--mag:#E33BC5;--lime:#CCFF00;
--t2:rgba(26,15,46,0.55);--t3:rgba(26,15,46,0.35);
--bg1:#FFF5F0;--bg2:#FFFAED;--bg3:#FFF3B0;
--card:#FFFFFF;--border:rgba(26,15,46,0.08);
--shadow:0 12px 32px -8px rgba(26,15,46,0.08);
--radius:16px;
}
html{scroll-behavior:smooth}
body{font-family:'Plus Jakarta Sans',sans-serif;color:var(--ink);background:linear-gradient(150deg,var(--bg1) 0%,var(--bg2) 50%,var(--bg3) 100%);background-attachment:fixed;min-height:100vh;-webkit-font-smoothing:antialiased}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");pointer-events:none;z-index:0;opacity:0.4}
.font-h{font-family:'Outfit',sans-serif}

/* Auth */
#auth-screen{position:fixed;inset:0;z-index:9999;background:linear-gradient(150deg,var(--bg1),var(--bg2),var(--bg3));display:flex;align-items:center;justify-content:center;padding:20px}
#auth-screen.hidden{display:none}
.auth-card{background:var(--card);border-radius:20px;box-shadow:var(--shadow);padding:40px 32px;max-width:340px;width:100%;text-align:center}
.auth-input{width:100%;padding:14px 16px;border:2px solid var(--border);border-radius:12px;font-size:18px;outline:none;text-align:center;font-family:‘Plus Jakarta Sans’,sans-serif;background:#FAFAFA;letter-spacing:0.15em;transition:border-color 0.2s}
.auth-input:focus{border-color:var(--mag)}
.auth-btn{width:100%;padding:14px;background:var(--mag);color:#fff;border:none;border-radius:12px;font-family:‘Outfit’,sans-serif;font-weight:800;font-size:15px;cursor:pointer;margin-top:12px;transition:filter 0.2s}
.auth-btn:hover{filter:brightness(1.1)}
.auth-err{color:#E33B3C;font-size:12px;margin-top:8px;min-height:18px}

/* Layout */
#app{display:none}
#app.show{display:flex;min-height:100vh;position:relative;z-index:1}

/* Sidebar */
.sidebar{width:256px;background:var(--card);border-right:1px solid var(--border);position:fixed;top:0;left:-256px;bottom:0;z-index:50;overflow-y:auto;padding:20px 0;transition:left 0.3s ease}
.sidebar.open{left:0}
.sb-overlay{position:fixed;inset:0;background:rgba(26,15,46,0.25);z-index:40;display:none}
.sb-overlay.show{display:block}
@media(min-width:768px){
.sidebar{position:sticky;left:0!important;top:0;flex-shrink:0;height:100vh}
.sb-overlay{display:none!important}
.hamburger{display:none!important}
}
.sb-logo{display:flex;align-items:center;gap:8px;padding:0 20px;margin-bottom:24px}
.sb-section{width:100%;display:flex;align-items:center;gap:10px;padding:10px 20px;border:none;background:transparent;cursor:pointer;font-size:13px;font-weight:500;color:var(--ink);font-family:‘Plus Jakarta Sans’,sans-serif;text-align:left;border-left:3px solid transparent;transition:all 0.15s}
.sb-section.active{background:rgba(227,59,197,0.06);color:var(--mag);font-weight:700;border-left-color:var(--mag)}
.sb-sub{display:block;width:100%;padding:6px 12px;border:none;background:transparent;cursor:pointer;font-size:12px;text-align:left;color:var(--t2);font-weight:400;font-family:‘Plus Jakarta Sans’,sans-serif;border-radius:6px;margin-bottom:2px;transition:all 0.15s}
.sb-sub.active{background:rgba(227,59,197,0.04);color:var(--mag);font-weight:600}

/* Top bar */
.topbar{position:sticky;top:0;z-index:30;background:rgba(255,245,240,0.92);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;gap:12px}
.search-input{flex:1;max-width:480px;padding:10px 16px;border:1.5px solid var(--border);border-radius:10px;font-size:13px;outline:none;background:#fff;font-family:‘Plus Jakarta Sans’,sans-serif}
.search-input:focus{border-color:var(--mag)}
.search-results{position:absolute;top:100%;left:0;right:0;background:#fff;border-radius:10px;box-shadow:0 12px 40px rgba(26,15,46,0.15);margin-top:4px;overflow:hidden;z-index:100}
.search-item{display:block;width:100%;padding:10px 16px;border:none;border-bottom:1px solid var(--border);background:transparent;cursor:pointer;font-size:13px;text-align:left;color:var(--ink);font-family:‘Plus Jakarta Sans’,sans-serif}
.search-item:hover{background:rgba(227,59,197,0.04)}
.breadcrumb{font-size:12px;color:var(--t2);display:flex;align-items:center;gap:6px;flex-shrink:0;white-space:nowrap}

/* Content */
.main{flex:1;min-width:0}
.content{padding:28px 24px 64px;max-width:820px}
.page-title{font-family:’Outfit’,sans-serif;font-weight:900;font-size:26px;color:var(--ink);margin-bottom:24px;padding-bottom:16px;border-bottom:2px solid var(--border)}

/* Components */
.card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:24px;transition:transform 0.2s,box-shadow 0.2s}
.card:hover{transform:translateY(-2px);box-shadow:0 16px 40px -8px rgba(26,15,46,0.12)}
.h3{font-family:’Outfit’,sans-serif;font-weight:800;font-size:16px;color:var(--ink);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.h3::before{content:’’;width:4px;height:18px;border-radius:2px;background:var(--mag);flex-shrink:0}
.mt{margin-top:28px}
.p{font-size:14px;line-height:1.7;color:rgba(26,15,46,0.7);margin-bottom:16px}
.kv{border-left:3px solid var(--mag);padding-left:16px;margin-bottom:16px;background:rgba(227,59,197,0.02);border-radius:0 12px 12px 0;padding:14px 16px}
.kv-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--mag);margin-bottom:4px}
.kv-value{font-size:14px;line-height:1.6;color:var(--ink)}
.list-item{display:flex;gap:10px;align-items:flex-start;margin-bottom:8px}
.list-dot{color:var(--mag);flex-shrink:0;margin-top:2px;font-size:10px}
.list-text{font-size:13.5px;line-height:1.6;color:rgba(26,15,46,0.75)}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
.stat-card{background:var(--card);border-radius:12px;padding:16px;border-left:3px solid var(--mag);box-shadow:0 2px 8px rgba(26,15,46,0.04);transition:transform 0.15s}
.stat-card:hover{transform:translateY(-1px)}
.stat-label{font-size:10px;color:var(--t2);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:6px;font-weight:600}
.stat-value{font-size:22px;font-weight:900;font-family:’Outfit’,sans-serif;color:var(--ink)}
.track-card{background:var(--card);border-radius:14px;padding:20px;margin-bottom:12px;box-shadow:0 2px 8px rgba(26,15,46,0.04);transition:transform 0.15s}
.track-card:hover{transform:translateY(-2px)}
.track-title{font-size:18px;font-weight:800;font-family:’Outfit’,sans-serif;color:var(--ink);margin-bottom:2px}
.track-sub{font-size:13px;font-weight:600;margin-bottom:10px}
.track-details{font-size:13px;line-height:1.6;color:rgba(26,15,46,0.6);white-space:pre-line}
.color-row{display:flex;align-items:center;gap:14px;margin-bottom:10px}
.color-swatch{width:48px;height:48px;border-radius:10px;flex-shrink:0}
.color-name{font-weight:700;font-size:13px;color:var(--ink)}
.color-hex{font-weight:400;color:var(--t2);font-family:monospace;font-size:12px}
.color-usage{font-size:12px;color:var(--t2)}
.tbl-wrap{overflow-x:auto;margin-bottom:20px;border-radius:12px;border:1px solid var(--border);box-shadow:0 2px 8px rgba(26,15,46,0.04)}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:linear-gradient(135deg,rgba(26,15,46,0.06),rgba(227,59,197,0.04));padding:12px 14px;text-align:left;font-weight:700;color:var(--ink);border-bottom:2px solid var(--border);white-space:nowrap;font-size:12px;text-transform:uppercase;letter-spacing:0.03em}
td{padding:11px 14px;border-bottom:1px solid var(--border);color:rgba(26,15,46,0.7);line-height:1.5}
tr:nth-child(even) td{background:rgba(26,15,46,0.015)}
tr:hover td{background:rgba(227,59,197,0.03)}
.copy-card{margin-bottom:12px;padding:18px 20px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);border-left:3px solid rgba(227,59,197,0.3);box-shadow:0 2px 8px rgba(26,15,46,0.03);transition:border-left-color 0.2s}
.copy-card:hover{border-left-color:var(--mag)}
.copy-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.copy-label{font-size:13px;font-weight:700;color:var(--mag)}
.copy-btn{background:rgba(26,15,46,0.06);border:none;border-radius:8px;padding:6px 14px;font-size:12px;font-weight:700;color:var(--ink);cursor:pointer;font-family:’Plus Jakarta Sans’,sans-serif;transition:all 0.2s}
.copy-btn:hover{background:rgba(26,15,46,0.1)}
.copy-btn.done{background:var(--lime)}
.copy-text{font-size:13px;line-height:1.7;color:rgba(26,15,46,0.65);white-space:pre-wrap}
.alert{border-radius:10px;padding:14px 18px;margin-bottom:16px;font-size:13.5px;line-height:1.6}
.alert-warn{background:rgba(255,170,0,0.08);border-left:3px solid #FFA500;color:#8B6914}
.alert-err{background:rgba(227,59,60,0.06);border-left:3px solid #E33B3C;color:#A02020}
.placeholder{text-align:center;padding:48px 24px;color:var(--t2)}
.placeholder-icon{font-size:48px;margin-bottom:12px;opacity:0.3}

/* Checklist */
.check-progress{font-size:12px;color:var(--t2);margin-bottom:8px;font-weight:600}
.check-bar{background:rgba(26,15,46,0.04);border-radius:8px;height:8px;margin-bottom:16px;overflow:hidden}
.check-fill{height:100%;background:linear-gradient(90deg,var(--mag),var(--lime));border-radius:8px;transition:width 0.4s ease}
.check-item{display:flex;gap:12px;align-items:flex-start;padding:12px 14px;border-bottom:1px solid var(--border);cursor:pointer;border-radius:8px;margin-bottom:2px;transition:background 0.15s}
.check-item:hover{background:rgba(26,15,46,0.02)}
.check-item input{accent-color:var(--mag);width:18px;height:18px;margin-top:2px;flex-shrink:0;cursor:pointer}
.check-item span{font-size:14px;line-height:1.5;transition:all 0.2s}
.check-item.done{background:rgba(204,255,0,0.04)}
.check-item.done span{color:var(--t3);text-decoration:line-through}

/* Dashboard */
.dash-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:28px}
.dash-stat{text-align:center;padding:20px 16px;position:relative;overflow:hidden}
.dash-stat::after{content:’’;position:absolute;bottom:0;left:20%;right:20%;height:3px;border-radius:2px;background:linear-gradient(90deg,var(--mag),var(--lime));opacity:0.3}
.dash-stat-val{font-size:28px;font-weight:900;font-family:’Outfit’,sans-serif}
.dash-stat-label{font-size:10px;color:var(--t2);text-transform:uppercase;letter-spacing:0.08em;margin-top:6px;font-weight:600}
.dash-links{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px}
.dash-link{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 16px;text-align:left;cursor:pointer;font-size:13px;font-weight:600;color:var(--ink);font-family:’Plus Jakarta Sans’,sans-serif;transition:all 0.2s;border-left:3px solid transparent}
.dash-link:hover{border-color:var(--mag);border-left-color:var(--mag);transform:translateY(-2px);box-shadow:0 4px 12px rgba(227,59,197,0.08)}

.hamburger{border:none;background:none;cursor:pointer;font-size:20px;padding:4px;line-height:1}
</style>

</head>
<body>

<!-- AUTH SCREEN -->

<div id="auth-screen">
  <div class="auth-card">
    <svg width="40" height="40" viewBox="0 0 80 80" fill="none" style="margin-bottom:16px"><polygon points="40,16 18,62 30,62 40,38 50,62 62,62" fill="#1A0F2E"/></svg>
    <h1 class="font-h" style="font-weight:900;font-size:20px;color:var(--ink);margin-bottom:4px">APEX TALENT</h1>
    <p style="font-size:13px;color:var(--t2);margin-bottom:24px">Knowledge Base</p>
    <input type="password" id="pin-input" class="auth-input" placeholder="••••" maxlength="20" autofocus>
    <button class="auth-btn" onclick="tryAuth()">Войти</button>
    <div class="auth-err" id="auth-err"></div>
  </div>
</div>

<!-- APP -->

<div id="app">
  <!-- Sidebar overlay -->
  <div class="sb-overlay" id="sb-overlay" onclick="toggleSidebar()"></div>

  <!-- Sidebar -->

  <aside class="sidebar" id="sidebar">
    <div class="sb-logo">
      <svg width="24" height="24" viewBox="0 0 80 80" fill="none"><polygon points="40,16 18,62 30,62 40,38 50,62 62,62" fill="#1A0F2E"/></svg>
      <div>
        <div class="font-h" style="font-weight:900;font-size:12px;letter-spacing:0.1em;color:var(--ink)">APEX TALENT</div>
        <div style="font-size:10px;color:var(--t2)">Knowledge Base</div>
      </div>
    </div>
    <nav id="sidebar-nav"></nav>
  </aside>

  <!-- Main -->

  <div class="main">
    <div class="topbar">
      <button class="hamburger" onclick="toggleSidebar()">☰</button>
      <div style="flex:1;position:relative;max-width:480px">
        <input type="text" class="search-input" id="search-input" placeholder="🔍 Поиск по базе знаний..." oninput="handleSearch(this.value)">
        <div class="search-results" id="search-results" style="display:none"></div>
      </div>
      <div class="breadcrumb" id="breadcrumb"></div>
    </div>
    <div class="content" id="content"></div>
  </div>
</div>

<script>
// ═══ AUTH ═══
const PASS = "8008";
function tryAuth(){
  const v = document.getElementById('pin-input').value;
  if(v === PASS){
    localStorage.setItem('kb-auth','1');
    document.getElementById('auth-screen').classList.add('hidden');
    document.getElementById('app').classList.add('show');
    initApp();
  } else {
    document.getElementById('auth-err').textContent = 'Неверный пароль';
    document.getElementById('pin-input').value = '';
  }
}
document.getElementById('pin-input').addEventListener('keydown', e => { if(e.key==='Enter') tryAuth(); });
if(localStorage.getItem('kb-auth')==='1'){
  document.getElementById('auth-screen').classList.add('hidden');
  document.getElementById('app').classList.add('show');
  setTimeout(initApp, 0);
}

// ═══ DATA ═══
const SECTIONS = {
  dashboard:{icon:"🏠",title:"Dashboard",subs:{overview:"Обзор"}},

  countries:{icon:"🌍",title:"Страны",subs:{ph:"🇵🇭 Филиппины",id:"🇮🇩 Индонезия",br:"🇧🇷 Бразилия",ng:"🇳🇬 Нигерия"}},
  recruiting:{icon:"📣",title:"Рекрутинг",subs:{manual:"Ручной рекрутинг",fb_strategy:"FB-правила",templates:"Шаблоны",objections:"Возражения",followup:"Follow-up",automation:"Автоматизация (Phase 2)"}},
  tech:{icon:"🤖",title:"Техдок",subs:{bot:"Telegram-бот",infra:"Инфраструктура",deploy:"Деплой",landing:"Лендинг"}},
  finance:{icon:"💰",title:"Финансы",subs:{revenue:"Доходы",fb_budget:"Бюджет",funnel:"Воронка"}},
  sop:{icon:"📑",title:"SOP",subs:{onboard_op:"Онбординг оператора",onboard_va:"Онбординг VA",daily:"Ежедневный чеклист",warmup:"Прогрев FB-акка",incident:"Инциденты"}},
  checklists:{icon:"✅",title:"Чеклисты",subs:{launch:"Чеклист запуска",kpi:"KPI трекер"}}

const C = {};
C["brand.mission"] = {title:"Миссия и позиционирование",blocks:[
  {t:"kv",l:"Mission",v:"Build careers — not gigs — in the live streaming economy, one operator at a time."},
  {t:"kv",l:"Vision",v:"The world's most trusted talent platform for the live streaming economy."},
  {t:"kv",l:"Brand Promise",v:"Real USD income from week one. World-class training with a personal mentor. A global community that has your back. No fees, no gimmicks, no gatekeeping."},
  {t:"p",v:"Позиционирование: для амбициозных digital-native профессионалов в emerging markets, которые хотят зарабатывать в USD удалённо."},
  {t:"h",v:"Core Values"},
  {t:"li",items:["Transparency — Нет скрытых расходов, еженедельные выплаты","Empowerment — Строим карьеры, обучение + менторство","Global First — 15+ стран, 4 часовых зоны","Craft — Мы строим профессионалов, не гиг-работников","Trust — Мы никогда не берём деньги с кандидатов"]}
]};
C["brand.tracks"] = {title:"3 трека Apex Talent",blocks:[
  {t:"tracks",items:[
    {title:"🎛 Operator",sub:"Live Stream Moderator",accent:"#06B6D4",details:"Регион: SEA (PH/ID/TH)\nДоход: $150–400+/week rev share\nТехподдержка стримеров — OBS, чат, broadcast"},
    {title:"🎬 Creator",sub:"Content Creator / Streamer",accent:"#C9A84C",details:"Регион: LATAM (BR/CO/MX/AR)\nДоход: $10/day passive + бонусы\nСтримеры и контент-криейторы"},
    {title:"🌐 Ambassador",sub:"Talent Scout / Ambassador",accent:"#22C55E",details:"Регион: Global\nДоход: $50–200 per referral\nПривлечение кандидатов, представительство бренда"}
  ]},
  {t:"h",v:"Критические правила нейминга"},
  {t:"li",items:["НИКОГДА «model» → «Content Creator» / «Streamer»","НИКОГДА «referral agent» → «Ambassador» / «Talent Scout»","НИКОГДА «HuntMe» → «Apex Talent»"]},

C["brand.voice"] = {title:"Tone of Voice и Banned Words",blocks:[

]};
C["brand.design"] = {title:"Дизайн-система",blocks:[
  {t:"h",v:"Палитра"},
  {t:"colors",items:[
    {name:"Ink",hex:"#1A0F2E",usage:"Текст, навигация, лого"},
    {name:"Magenta",hex:"#E33BC5",usage:"Акценты, CTA, ссылки"},
    {name:"Lime",hex:"#CCFF00",usage:"Badges, highlights, success"},
    {name:"Background",hex:"#FFF5F0→#FFF3B0",usage:"Основной фон (gradient)"},
    {name:"Card",hex:"#FFFFFF",usage:"Карточки, формы"}
  ]},
  {t:"h",v:"Шрифты"},
  {t:"li",items:["Outfit — заголовки (700–900, tight tracking)","Plus Jakarta Sans — body (400–600)","Fraunces — акцентная serif (italic)"]},

// ═══ STATE ═══
let state = {sec:'dashboard',sub:'overview'};
let checks = JSON.parse(localStorage.getItem('kb-checks')||'{}');

function saveChecks(){ localStorage.setItem('kb-checks',JSON.stringify(checks)); }

// ═══ RENDER ═══
function renderSidebar(){
  let html = '';
  for(const [key,sec] of Object.entries(SECTIONS)){
    const active = state.sec===key;
    html += `<button class="sb-section${active?' active':''}" onclick="nav('${key}','${Object.keys(sec.subs)[0]}')">${sec.icon} ${sec.title}</button>`;
    if(active){
      html += '<div style="padding-left:48px">';
      for(const [sk,st] of Object.entries(sec.subs)){
        html += `<button class="sb-sub${state.sub===sk?' active':''}" onclick="nav('${key}','${sk}')">${st}</button>`;
      }
      html += '</div>';
    }
  }
  document.getElementById('sidebar-nav').innerHTML = html;
}

function renderBreadcrumb(){
  const sec = SECTIONS[state.sec];
  let html = `<span>${sec.icon}</span><span>${sec.title}</span>`;
  if(state.sub!=='overview') html += `<span style="opacity:0.3">/</span><span style="color:var(--ink);font-weight:600">${sec.subs[state.sub]}</span>`;
  document.getElementById('breadcrumb').innerHTML = html;
}

function renderBlock(b){
  switch(b.t){
    case 'h': return `<h3 class="h3 mt">${b.v}</h3>`;
    case 'p': return `<p class="p">${b.v}</p>`;
    case 'kv': return `<div class="kv"><div class="kv-label">${b.l}</div><div class="kv-value">${b.v}</div></div>`;
    case 'li': return b.items.map(i=>`<div class="list-item"><span class="list-dot">●</span><span class="list-text">${i}</span></div>`).join('')+'<div style="margin-bottom:16px"></div>';
    case 'stats': return `<div class="stat-grid">${b.items.map(s=>`<div class="stat-card"><div class="stat-label">${s.l}</div><div class="stat-value">${s.v}</div></div>`).join('')}</div>`;
    case 'tracks': return b.items.map(c=>`<div class="track-card" style="border-left:4px solid ${c.accent}"><div class="track-title">${c.title}</div><div class="track-sub" style="color:${c.accent}">${c.sub}</div><div class="track-details">${c.details}</div></div>`).join('');
    case 'colors': return b.items.map(c=>`<div class="color-row"><div class="color-swatch" style="background:${c.hex};${c.hex.includes('FFF')?'border:1px solid var(--border)':''}"></div><div><div class="color-name">${c.name} <span class="color-hex">${c.hex.length<20?c.hex:''}</span></div><div class="color-usage">${c.usage}</div></div></div>`).join('')+'<div style="margin-bottom:20px"></div>';
    case 'tbl': return `<div class="tbl-wrap"><table><thead><tr>${b.headers.map(h=>`<th>${h}</th>`).join('')}</tr></thead><tbody>${b.rows.map(r=>`<tr>${r.map(c=>`<td>${c}</td>`).join('')}</tr>`).join('')}</tbody></table></div>`;
    case 'copy': return `<div class="copy-card"><div class="copy-header"><span class="copy-label">${b.l}</span><button class="copy-btn" onclick="copyText(this,'${esc(b.v)}')">📋 Копировать</button></div><div class="copy-text">${b.v.replace(/\n/g,'<br>')}</div></div>`;
    case 'alert': return `<div class="alert ${b.variant==='err'?'alert-err':'alert-warn'}">${b.v}</div>`;
    case 'placeholder': return `<div class="placeholder"><div class="placeholder-icon">🚧</div><div>${b.v}</div></div>`;
    case 'check':
      if(!checks[b.id]) checks[b.id] = new Array(b.items.length).fill(false);
      const done = checks[b.id].filter(Boolean).length;
      const pct = (done/b.items.length*100).toFixed(0);
      let h = `<div class="check-progress">${done} / ${b.items.length} выполнено</div>`;
      h += `<div class="check-bar"><div class="check-fill" style="width:${pct}%"></div></div>`;
      b.items.forEach((item,j)=>{
        const ch = checks[b.id][j];
        h += `<label class="check-item${ch?' done':''}"><input type="checkbox" ${ch?'checked':''} onchange="toggleCheck('${b.id}',${j})"><span>${item}</span></label>`;
      });
      return h;
    default: return '';
  }
}

function esc(s){ return s.replace(/'/g,"\\'").replace(/\n/g,'\\n'); }

function copyText(btn,text){
  navigator.clipboard.writeText(text.replace(/\\n/g,'\n'));
  btn.textContent = '✓ Скопировано';
  btn.classList.add('done');
  setTimeout(()=>{ btn.textContent='📋 Копировать'; btn.classList.remove('done'); },2000);
}

function toggleCheck(id,idx){
  checks[id][idx] = !checks[id][idx];
  saveChecks();
  renderContent();
}

function renderDashboard(){
  const totalPages = Object.keys(C).length;
  const totalChecks = Object.values(C).reduce((a,c)=>a+c.blocks.filter(b=>b.t==='check').length,0);
  let totalItems=0, doneItems=0;
  Object.values(C).forEach(c=>c.blocks.forEach(b=>{if(b.t==='check'){totalItems+=b.items.length;if(checks[b.id])doneItems+=checks[b.id].filter(Boolean).length;}}));

  const quickLinks = [
    {key:"recruiting.manual",label:"🎯 Ручной рекрутинг"},
    {key:"recruiting.templates",label:"📝 Шаблоны объявлений"},
    {key:"recruiting.objections",label:"💬 Обработка возражений"},
    {key:"sop.daily",label:"📋 Ежедневный чеклист"},
    {key:"countries.ph",label:"🇵🇭 Филиппины"},
    {key:"countries.id",label:"🇮🇩 Индонезия"},
    {key:"countries.ng",label:"🇳🇬 Нигерия"},
    {key:"checklists.launch",label:"🚀 Чеклист запуска"},
    {key:"brand.voice",label:"🗣 Tone of Voice"},
  ];

  let html = `<h1 class="page-title">Dashboard</h1>
    <p class="p">Apex Talent — все гайды, SOP, шаблоны и чеклисты для рекрутинга. Phase 1: ручной старт, Phase 2: автоматизация.</p>
    <div class="dash-stats">
      <div class="card dash-stat"><div class="dash-stat-val" style="color:var(--mag)">${Object.keys(SECTIONS).length}</div><div class="dash-stat-label">Разделов</div></div>
      <div class="card dash-stat"><div class="dash-stat-val" style="color:var(--ink)">${totalPages}</div><div class="dash-stat-label">Страниц</div></div>
      <div class="card dash-stat"><div class="dash-stat-val" style="color:#22C55E">${totalChecks}</div><div class="dash-stat-label">Чеклистов</div></div>
      <div class="card dash-stat"><div class="dash-stat-val" style="color:#C9A84C">${doneItems}/${totalItems}</div><div class="dash-stat-label">Выполнено</div></div>
    </div>
    <h2 class="h3">Быстрый доступ</h2>
    <div class="dash-links">${quickLinks.map(l=>`<button class="dash-link" onclick="nav('${l.key.split('.')[0]}','${l.key.split('.')[1]}')">${l.label}</button>`).join('')}</div>`;
  return html;
}

function renderContent(){
  const el = document.getElementById('content');
  if(state.sec==='dashboard'){
    el.innerHTML = renderDashboard();
    return;
  }
  const key = state.sec+'.'+state.sub;
  const c = C[key];
  if(!c){
    el.innerHTML = '<div class="placeholder"><div class="placeholder-icon">📄</div><div>Выбери раздел</div></div>';
    return;
  }
  el.innerHTML = `<h1 class="page-title">${c.title}</h1>${c.blocks.map(renderBlock).join('')}`;
}

function nav(sec,sub){
  state.sec=sec; state.sub=sub;
  renderSidebar(); renderBreadcrumb(); renderContent();
  closeSidebar();
  window.scrollTo(0,0);
}

function toggleSidebar(){
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sb-overlay').classList.toggle('show');
}
function closeSidebar(){
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sb-overlay').classList.remove('show');
}

// Search
function handleSearch(q){
  const res = document.getElementById('search-results');
  if(q.length<2){ res.style.display='none'; return; }
  const lower = q.toLowerCase();
  const matches = Object.entries(C).filter(([k,v])=>JSON.stringify(v).toLowerCase().includes(lower)).slice(0,8);
  if(!matches.length){ res.style.display='none'; return; }
  res.style.display='block';
  res.innerHTML = matches.map(([k,v])=>`<button class="search-item" onclick="navFromSearch('${k}')">${v.title}</button>`).join('');
}
function navFromSearch(key){
  const [s,sub]=key.split('.');
  nav(s,sub);
  document.getElementById('search-input').value='';
  document.getElementById('search-results').style.display='none';
}
document.addEventListener('click',e=>{
  if(!e.target.closest('.search-input')&&!e.target.closest('.search-results'))
    document.getElementById('search-results').style.display='none';
});

function initApp(){
  renderSidebar(); renderBreadcrumb(); renderContent();
}
</script>
