<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Воронка Габи — WA Preview</title>
<meta name="robots" content="noindex, nofollow">
<style>
@import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#0b141a;--hdr:#202c33;--bin:#202c33;--bout:#005c4b;--txt:#e9edef;--txt2:#8696a0;--tm:rgba(255,255,255,.5);--acc:#00a884;--div:rgba(255,255,255,.06)}
html,body{height:100%;overflow:hidden}
body{font-family:'Roboto','Segoe UI',sans-serif;background:#111b21;color:var(--txt);display:flex;justify-content:center;align-items:center}
.ph{width:100%;max-width:412px;height:100dvh;max-height:896px;display:flex;flex-direction:column;background:var(--bg);position:relative;overflow:hidden}
@media(min-width:500px){.ph{border-radius:20px;border:1.5px solid #2a3942;height:90vh;box-shadow:0 20px 60px rgba(0,0,0,.6)}}
.hdr{background:var(--hdr);height:56px;display:flex;align-items:center;padding:0 6px 0 4px;flex-shrink:0;z-index:5}
.hdr-back{width:36px;height:40px;display:flex;align-items:center;justify-content:center;color:var(--txt2)}
.hdr-back svg{width:20px;height:20px}
.hdr-ava{width:40px;height:40px;border-radius:50%;margin:0 10px 0 0;flex-shrink:0;background:linear-gradient(135deg,#e8576d,#d63384);display:flex;align-items:center;justify-content:center;font-size:17px;color:#fff;font-weight:500}
.hdr-info{flex:1;min-width:0}
.hdr-name{font-size:16px;font-weight:500;color:var(--txt)}
.hdr-st{font-size:13px;color:var(--acc)}
.hdr-ic{display:flex;gap:20px;margin-left:auto;padding-right:4px}
.hdr-ic svg{width:22px;height:22px;color:var(--txt2)}
.chat{flex:1;overflow-y:auto;padding:6px 10px 10px;scroll-behavior:smooth}
.chat::-webkit-scrollbar{width:4px}
.chat::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:2px}
.b{max-width:82%;padding:6px 7px 4px 9px;margin-bottom:1px;font-size:14.2px;line-height:1.35;word-wrap:break-word;white-space:pre-wrap;position:relative;animation:bI .25s ease-out}
@keyframes bI{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.b.in{background:var(--bin);border-radius:0 8px 8px 8px;margin-right:auto}
.b.out{background:var(--bout);border-radius:8px 0 8px 8px;margin-left:auto}
.b.tl{margin-bottom:6px}
.bt{font-size:11px;color:var(--tm);float:right;margin:2px 0 -3px 8px;display:flex;align-items:center;gap:3px}
.ck{display:inline-flex;color:#53bdeb}
.ck svg{width:16px;height:11px}
.dc{text-align:center;margin:10px 0}
.dc span{background:#182229;color:var(--txt2);font-size:12.5px;padding:5px 12px;border-radius:8px;display:inline-block}
.ba{display:flex;align-items:center;gap:8px;min-width:220px;padding:4px 0}
.aa{width:34px;height:34px;border-radius:50%;flex-shrink:0;background:linear-gradient(135deg,#e8576d,#d63384);display:flex;align-items:center;justify-content:center;font-size:14px;color:#fff;order:3}
.ap{width:28px;height:28px;border-radius:50%;border:none;background:none;color:var(--txt2);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ap svg{width:18px;height:18px}
.aw{flex:1;height:24px;display:flex;align-items:center;gap:1.5px}
.aw i{width:2.5px;border-radius:1.5px;display:block;background:rgba(255,255,255,.4)}
.ad{font-size:11px;color:var(--txt2);flex-shrink:0}
.bi{border-radius:6px;overflow:hidden;margin:-2px -3px 3px -5px;width:calc(100% + 8px)}
.ip{width:100%;aspect-ratio:4/3;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;font-size:12px;color:var(--txt2)}
.ip.cs{background:linear-gradient(145deg,#1a2b30,#1f3535,#1a2b2e)}
.ip.mm{background:linear-gradient(145deg,#1c2e1c,#233a23,#1c2e1c);aspect-ratio:1/1;max-height:200px}
.ip.pf{background:linear-gradient(145deg,#2a1a2e,#352035,#2e1a2b)}
.ip .ic{font-size:36px;opacity:.5}
.ip .su{font-size:11px;opacity:.6;max-width:80%;text-align:center;line-height:1.3}
.tw{margin-bottom:6px}
.ty{display:inline-flex;gap:4px;padding:10px 14px;background:var(--bin);border-radius:0 8px 8px 8px}
.ty i{width:6px;height:6px;border-radius:50%;background:var(--txt2);display:block;animation:tb 1.4s infinite}
.ty i:nth-child(2){animation-delay:.2s}
.ty i:nth-child(3){animation-delay:.4s}
@keyframes tb{0%,60%,100%{transform:translateY(0);opacity:.35}30%{transform:translateY(-4px);opacity:.9}}
.ia{background:var(--bg);padding:4px 6px 6px;display:flex;align-items:flex-end;gap:4px;flex-shrink:0}
.iw{flex:1;background:var(--hdr);border-radius:22px;display:flex;align-items:center;padding:4px 8px 4px 12px}
.ie{font-size:22px;color:var(--txt2);cursor:pointer;margin-right:6px;line-height:1}
.if{flex:1;background:none;border:none;color:var(--txt);font:15px/1.3 'Roboto',sans-serif;outline:none;padding:6px 0;min-height:22px}
.if::placeholder{color:var(--txt2)}
.is{width:42px;height:42px;border-radius:50%;border:none;background:var(--acc);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:transform .12s}
.is:active{transform:scale(.88)}
.is svg{width:20px;height:20px}
.qr{padding:0 10px 2px;flex-shrink:0;display:flex;gap:6px;flex-wrap:wrap}
.qb{padding:8px 16px;border-radius:20px;border:1.2px solid var(--acc);background:transparent;color:var(--acc);font:13px/1 'Roboto',sans-serif;cursor:pointer;transition:background .15s}
.qb:active{background:rgba(0,168,132,.2);transform:scale(.96)}
.rs{position:absolute;bottom:60px;right:10px;font-size:11px;color:var(--txt2);cursor:pointer;opacity:.4;z-index:10;background:var(--hdr);padding:3px 8px;border-radius:10px;transition:opacity .2s}
.rs:hover{opacity:.8}
.dl{text-align:center;font-size:11px;color:var(--txt2);font-style:italic;margin:4px 0 6px;padding:0 20px}
.ec{text-align:center;padding:30px 20px;animation:bI .4s ease-out}
.ec .ei{font-size:48px;margin-bottom:12px}
.ec .et{font-size:18px;font-weight:500;margin-bottom:8px}
.ec .es{font-size:13px;color:var(--txt2);line-height:1.4}
.ec .eb{margin-top:18px;padding:10px 24px;border-radius:20px;border:none;background:var(--acc);color:#fff;font:14px/1 'Roboto',sans-serif;cursor:pointer}
</style>
</head>
<body>
<div class="ph">
  <div class="hdr">
    <div class="hdr-back"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2H7.83l5.58-5.59z"/></svg></div>

      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20.01 15.38c-1.23 0-2.42-.2-3.53-.56-.35-.12-.74-.03-1.01.24l-1.57 1.97c-2.83-1.35-5.48-3.9-6.89-6.83l1.95-1.66c.27-.28.35-.67.24-1.02-.37-1.11-.56-2.3-.56-3.53 0-.54-.45-.99-.99-.99H4.19C3.65 3 3 3.24 3 3.99 3 13.28 10.73 21 20.01 21c.71 0 .99-.63.99-1.18v-3.45c0-.54-.45-.99-.99-.99z"/></svg>
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 8c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm0 2c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"/></svg>
    </div>
  </div>
  <div class="rs" onclick="reset()">&#8635; сначала</div>
  <div class="chat" id="c"></div>

  </div>
</div>

let S={step:0,data:{},wait:null},el;
const now=()=>{const d=new Date();return d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0')};
const scroll=()=>setTimeout(()=>{if(el.scrollHeight-el.scrollTop-el.clientHeight<150)el.scrollTop=el.scrollHeight},40);
const wait=ms=>new Promise(r=>setTimeout(r,ms));
const tpl=s=>s.replace(/\{(\w+)\}/g,(_,k)=>S.data[k]||`{${k}}`);

function addB(text,dir='in',tail=true){
  const d=document.createElement('div');d.className=`b ${dir}${tail?' tl':''}`;
  const tm=dir==='out'?`<span class="bt">${now()} ${CK}</span>`:`<span class="bt">${now()}</span>`;
  d.innerHTML=text+tm;el.appendChild(d);scroll();
}
function addD(v){const d=document.createElement('div');d.className='dc';d.innerHTML=`<span>${v}</span>`;el.appendChild(d)}
function addA(dur){
  const bars=Array.from({length:30},()=>`<i style="height:${3+Math.random()*18}px"></i>`).join('');
  const d=document.createElement('div');d.className='b in tl';
  d.innerHTML=`<div class="ba"><button class="ap"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg></button><div class="aw">${bars}</div><span class="ad">${dur}</span><div class="aa">G</div></div><span class="bt">${now()}</span>`;
  el.appendChild(d);scroll();
}
function addG(cls,ico,lb,sub){
  const d=document.createElement('div');d.className='b in tl';
  d.innerHTML=`<div class="bi"><div class="ip ${cls}"><span class="ic">${ico}</span>${lb?`<span>${lb}</span>`:''}<span class="su">${sub}</span></div></div><span class="bt">${now()}</span>`;
  el.appendChild(d);scroll();
}
function addM(ico,sub){
  const d=document.createElement('div');d.className='b in tl';
  d.innerHTML=`<div class="bi"><div class="ip mm"><span class="ic">${ico}</span><span class="su">${sub}</span></div></div><span class="bt">${now()}</span>`;
  el.appendChild(d);scroll();
}
function addDl(v){const d=document.createElement('div');d.className='dl';d.textContent=v;el.appendChild(d)}
function addT(){const w=document.createElement('div');w.className='tw';w.id='tp';w.innerHTML='<div class="ty"><i></i><i></i><i></i></div>';el.appendChild(w);scroll()}
function rmT(){const e=document.getElementById('tp');if(e)e.remove()}
function setQ(bs){const c=document.getElementById('q');c.innerHTML='';bs.forEach(b=>{const e=document.createElement('button');e.className='qb';e.textContent=b.l;e.onclick=()=>{c.innerHTML='';act(b.v)};c.appendChild(e)})}
function clrQ(){document.getElementById('q').innerHTML=''}

async function run(from){
  let i=from;
  while(i<F.length){
    const m=F[i];
    if(m.t==='dyn'){i++;continue}
    if(m.t==='d'){addD(m.v);i++;continue}
    if(m.t==='dl'){addDl(m.v);i++;continue}

    addT();
    const len=m.v?.length||60;
    const ms=m.t==='a'?700:Math.min(2000,500+len*3.5);
    await wait(ms);rmT();

    if(m.t==='i') addB(m.v);
    else if(m.t==='it') addB(tpl(m.tpl));
    else if(m.t==='a') addA(m.dur);
    else if(m.t==='g') addG(m.cls,m.ico,m.lb,m.sub);
    else if(m.t==='m') addM(m.ico,m.sub);

    i++;

    if(m.cta){
      S.step=i;S.wait=m.cta;
      if(m.cta==='+') setQ([{l:m.cl||'+ продолжить',v:'+'}]);
      else if(m.cta==='хочу') setQ([{l:m.cl,v:'хочу'}]);
      else if(m.cta==='slot') setQ([{l:'Пт 10:00',v:'Пятница, 10:00'},{l:'Пт 14:00',v:'Пятница, 14:00'},{l:'Сб 11:00',v:'Суббота, 11:00'}]);
      else if(m.cta==='name') setQ([{l:m.cl,v:m.cl}]);
      else if(m.cta==='age') setQ([{l:m.cl,v:m.cl}]);
      else if(m.cta==='device') setQ([{l:m.cl,v:m.cl}]);
      return;
    }
    await wait(300);
  }
  S.wait=null;clrQ();await wait(500);
  const card=document.createElement('div');card.className='ec';
  card.innerHTML=`<div class="ei">🎊</div><div class="et">Воронка пройдена!</div><div class="es">~25 шагов · структура G2G<br>Кандидат записан в CRM</div><button class="eb" onclick="reset()">Сначала</button>`;
  el.appendChild(card);scroll();
}

function act(v){
  addB(v,'out');
  if(S.wait==='+'||S.wait==='хочу') run(S.step);
  else if(S.wait==='name'){S.data.name=v;run(S.step)}
  else if(S.wait==='age'){S.data.age=v;run(S.step)}
  else if(S.wait==='device'){S.data.device=v;run(S.step)}
  else if(S.wait==='slot'){S.data.slot=v;run(S.step)}
}
function send(){const i=document.getElementById('inp');const v=i.value.trim();if(!v)return;i.value='';clrQ();act(v)}
function reset(){S={step:0,data:{},wait:null};el.innerHTML='';clrQ();run(0)}
document.addEventListener('DOMContentLoaded',()=>{el=document.getElementById('c');document.getElementById('inp').addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();send()}});run(0)});
</script>
