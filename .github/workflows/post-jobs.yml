name: Auto-Post Jobs to Boards

on:
  schedule:
    # Mon/Wed/Fri at 22:00 UTC = morning in Philippines (06:00 UTC+8)
    - cron: '0 22 * * 1,3,5'
  workflow_dispatch: # Manual trigger

jobs:
  post-jobs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install playwright aiohttp anthropic python-dotenv
          playwright install chromium

      - name: Post to job boards
        run: python scripts/post_to_boards.py
        env:
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
          # Add per-board credentials as secrets:
          # JORA_EMAIL: ${{ secrets.JORA_EMAIL }}
          # JORA_PASSWORD: ${{ secrets.JORA_PASSWORD }}

      - name: Notify completion
        if: always()
        run: |
          curl -s "https://api.telegram.org/bot${{ secrets.BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.ADMIN_CHAT_ID }}" \
            -d "text=Job posting workflow completed: ${{ job.status }}" || true
